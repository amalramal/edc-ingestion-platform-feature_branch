# =============================================================================
# Alembic Configuration — EDC Ingestion Platform
# =============================================================================
# The sqlalchemy.url is overridden programmatically in env.py using the
# DATABASE_URL environment variable.  The value below is a safe local-dev
# default and is NEVER used in any deployed environment.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = postgresql://edc_user:edc_pass@localhost:5432/edc_platform

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
