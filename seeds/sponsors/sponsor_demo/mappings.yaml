eligibility_rule:
  - ruleId: ELIG-001
    studyId: null
    columnName: procedureStatus
    operator: EQUALS
    expectedValue: COMPLETE
    rejectionReason: "procedureStatus must be 'COMPLETE' to generate payment."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-002
    studyId: null
    columnName: blankFormIndicator
    operator: EQUALS
    expectedValue: "1"
    rejectionReason: "blankFormIndicator must be '1' to generate payment."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-003
    studyId: null
    columnName: formNotDoneIndicator
    operator: EQUALS
    expectedValue: "0"
    rejectionReason: "formNotDoneIndicator must be '0' to generate payment."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-004
    studyId: null
    columnName: subjectVisitDate
    operator: IS_NOT_NULL
    expectedValue: null
    rejectionReason: "subjectVisitDate cannot be blank/null to generate payment."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-005
    studyId: null
    columnName: subjectStatus
    operator: IS_NOT_NULL
    expectedValue: null
    rejectionReason: "subjectStatus cannot be blank/null; unpayable without status."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-006
    studyId: null
    columnName: erroneous
    operator: NOT_EQUALS
    expectedValue: "1"
    rejectionReason: "Erroneous visit — row marked as erroneous and cannot be paid."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-007
    studyId: null
    columnName: subjectId
    operator: IS_NOT_NULL
    expectedValue: null
    rejectionReason: "subjectId is required for every EDC row."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system
  - ruleId: ELIG-008
    studyId: null
    columnName: studySiteNumber
    operator: IS_NOT_NULL
    expectedValue: null
    rejectionReason: "studySiteNumber is required for every EDC row."
    ruleKind: NON_BLOCKING
    isActive: true
    createdBy: system

