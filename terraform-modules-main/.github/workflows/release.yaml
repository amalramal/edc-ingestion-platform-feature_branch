name: Terraform Module Releaser
on:
  pull_request:
    types:
      - closed # required
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Terraform Module Releaser
        uses: techpivot/terraform-module-releaser@v1
        id: release
        with:
          use-ssh-source-format: true
          module-path-ignore: "template,template/**,**/examples"
